<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Modifiers Lab</title>
    <link rel="stylesheet" href="../unocss/uno.css">
    <style>
        :root {
            --font-ui: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            --ink: #162033;
            --muted: #64748b;
            --line: #d8e1ee;
            --bg: #f7fafc;
        }

        * { box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 74px;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--font-ui);
            line-height: 1.45;
        }

        code { font-family: var(--font-mono); }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 54px;
            padding: 10px clamp(16px, 4vw, 38px);
            background: rgba(255, 255, 255, .92);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(14px);
        }

        .topbar a,
        .topbar button {
            border: 1px solid #cbd5e1;
            border-radius: 7px;
            background: #ffffff;
            color: #172033;
            cursor: pointer;
            font: 800 12px/1 var(--font-ui);
            padding: 9px 11px;
            text-decoration: none;
        }

        .topbar a[aria-current="page"] {
            background: #101827;
            color: #ffffff;
        }

        .topbar .spacer { flex: 1; }

        .hero {
            padding: 34px clamp(18px, 4vw, 44px) 28px;
            background: #ffffff;
            border-bottom: 1px solid var(--line);
        }

        .kicker {
            color: #059669;
            font: 900 12px/1 var(--font-ui);
            letter-spacing: .12em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            color: #0f172a;
            font-size: clamp(42px, 6vw, 82px);
            line-height: .9;
        }

        .intro {
            max-width: 940px;
            margin: 14px 0 0;
            color: #475569;
            font-size: 17px;
            font-weight: 650;
        }

        .jump-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 18px;
        }

        .jump-list a {
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #f8fafc;
            color: #1f2a44;
            font: 800 12px/1 var(--font-ui);
            padding: 8px 10px;
            text-decoration: none;
        }

        main {
            display: grid;
            gap: 34px;
            padding: 24px clamp(18px, 4vw, 44px) 52px;
        }

        .section {
            display: grid;
            gap: 14px;
        }

        .section-head {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 14px;
        }

        h2 {
            margin: 0;
            color: #111827;
            font-size: clamp(28px, 3vw, 42px);
            line-height: .95;
        }

        .count {
            color: var(--muted);
            font: 900 12px/1 var(--font-mono);
            text-transform: uppercase;
        }

        .rows {
            display: grid;
            gap: 10px;
        }

        .row {
            display: grid;
            grid-template-columns: minmax(310px, 38%) minmax(230px, 24%) minmax(260px, 1fr);
            min-height: 106px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background:
                linear-gradient(90deg, rgba(15, 23, 42, .05) 1px, transparent 1px),
                linear-gradient(rgba(15, 23, 42, .05) 1px, transparent 1px),
                #f8fafc;
            background-size: 18px 18px, 18px 18px, auto;
        }

        .class-cell {
            display: grid;
            align-content: start;
            gap: 10px;
            min-width: 0;
            padding: 14px;
            border-right: 1px solid #e1e8f2;
            background: #ffffff;
        }

        .cell-label {
            color: #64748b;
            font: 900 11px/1 var(--font-ui);
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .code-block {
            min-width: 0;
            max-height: 176px;
            margin: 0;
            overflow: auto;
            border-radius: 7px;
            background: #101827;
            color: #ffffff61;
            padding: 11px;
            white-space: pre-wrap;
        }

        .code-block code {
            color: inherit;
            font: 650 11px/1.45 var(--font-mono);
            overflow-wrap: anywhere;
        }

        .code-class {
            display: inline-block;
            margin: 1px 1px 1px 0;
            padding: 1px 5px;
            border-radius: 5px;
            background: rgba(148, 163, 184, .16);
            color: #dbeafe;
            font-weight: 850;
        }

        .code-class--preset { background: rgba(37, 99, 235, .28); color: #bfdbfe; }
        .code-class--step { background: rgba(245, 158, 11, .26); color: #fde68a; }
        .code-class--modifier { background: rgba(16, 185, 129, .24); color: #bbf7d0; }
        .code-class--group { background: rgba(168, 85, 247, .28); color: #e9d5ff; }
        .code-class--variant { background: rgba(236, 72, 153, .24); color: #fbcfe8; }
        .code-class--state { background: rgba(239, 68, 68, .22); color: #fecaca; }
        .code-class--utility { background: rgba(20, 184, 166, .22); color: #ccfbf1; }
        .code-class--loop { background: rgba(249, 115, 22, .24); color: #fed7aa; }

        .expected-cell {
            display: grid;
            align-content: start;
            gap: 10px;
            min-width: 0;
            padding: 14px;
            border-right: 1px solid #e1e8f2;
            background: #ffffff;
        }

        .expected-list {
            display: grid;
            gap: 6px;
            margin: 0;
            padding: 0 0 0 17px;
            color: #334155;
            font: 700 12px/1.35 var(--font-ui);
        }

        .preview-cell {
            display: grid;
            align-content: start;
            gap: 8px;
            min-width: 0;
            padding: 14px;
        }

        .stage {
            display: grid;
            place-items: center;
            min-width: 0;
            min-height: 96px;
            padding: 4px;
        }

        [data-motion-preview] {
            position: relative;
            display: grid;
            place-items: center;
            width: min(270px, calc(100% - 28px));
            min-height: 62px;
            overflow: hidden;
            border: 1px solid #cad6e6;
            border-radius: 7px;
            background: #ffffff;
            color: #101827;
            box-shadow: 0 8px 18px rgba(15, 23, 42, .08);
            font: 900 12px/1.15 var(--font-ui);
            text-align: center;
            transform-origin: center;
            --speed: 650ms;
            --wait: 180ms;
            --curve: cubic-bezier(.22, 1, .36, 1);
        }

        [data-motion-group] {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            width: min(540px, 100%);
            padding: 14px;
            border: 1px dashed #b8c6d9;
            border-radius: 8px;
            background: rgba(255, 255, 255, .76);
        }

        [data-motion-group] > * {
            display: grid;
            place-items: center;
            width: 54px;
            height: 54px;
            border-radius: 7px;
            background: #ffffff;
            border: 1px solid #cad6e6;
            color: #101827;
            font: 900 12px/1 var(--font-ui);
        }

        @media (max-width: 760px) {
            .topbar {
                align-items: stretch;
                flex-wrap: wrap;
            }

            .topbar .spacer { display: none; }

            .topbar a,
            .topbar button {
                flex: 1 1 auto;
                text-align: center;
            }

            .row {
                grid-template-columns: minmax(0, 1fr);
            }

            .class-cell {
                border-right: 0;
                border-bottom: 1px solid #e1e8f2;
            }

            .expected-cell {
                border-right: 0;
                border-bottom: 1px solid #e1e8f2;
            }
        }
    </style>
</head>
<body>
    <nav class="topbar" aria-label="Motion test pages">
        <a href="step-path-torture.html">Step Path Lab</a>
        <a href="individual-animations.html">Individual Animations</a>
        <a href="variants.html">Variants</a>
        <a href="modifiers.html" aria-current="page">Modifiers</a>
        <a href="nested.html">Nested</a>
        <a href="step-loops.html">Step Loops</a>
        <a href="docs.html">Docs</a>
        <span class="spacer"></span>
        <button type="button" data-action="replay">Replay</button>
    </nav>

    <header class="hero">
        <div class="kicker">Modifier Matrix</div>
        <h1>Modifiers Lab</h1>
        <p class="intro">Timing, easing, loop counts, property-targeted controls, wait/still/pause/play, repeat markers, and step timeline modifiers.</p>
        <div class="jump-list" id="jump-list"></div>
    </header>

    <main id="app"></main>

    <script>
        const sections = [
            {
                id: 'duration-delay',
                title: 'Duration And Delay',
                cases: [
                    { classes: 'motion-preset-slide-up motion-duration', hint: 'Default duration token.' },
                    { classes: 'motion-preset-slide-up motion-duration-75', hint: '75ms duration.' },
                    { classes: 'motion-preset-slide-up motion-duration-150', hint: '150ms duration.' },
                    { classes: 'motion-preset-slide-up motion-duration-300', hint: '300ms duration.' },
                    { classes: 'motion-preset-slide-up motion-duration-700', hint: '700ms duration.' },
                    { classes: 'motion-preset-slide-up motion-duration-1500', hint: '1500ms duration.' },
                    { classes: 'motion-preset-slide-up motion-duration-2000', hint: '2000ms duration.' },
                    { classes: 'motion-preset-slide-up motion-duration-5000', hint: 'Raw numeric duration.' },
                    { classes: 'motion-preset-slide-up motion-duration-1s', hint: 'Raw seconds duration.' },
                    { classes: 'motion-preset-slide-up motion-duration-[var(--speed)]', hint: 'CSS variable duration.' },
                    { classes: 'motion-preset-pop motion-delay', hint: 'Default delay token.' },
                    { classes: 'motion-preset-pop motion-delay-75', hint: '75ms delay.' },
                    { classes: 'motion-preset-pop motion-delay-300', hint: '300ms delay.' },
                    { classes: 'motion-preset-pop motion-delay-1000', hint: '1000ms delay.' },
                    { classes: 'motion-preset-pop motion-delay-1s', hint: 'Raw seconds delay.' },
                    { classes: 'motion-preset-pop motion-delay-[var(--wait)]', hint: 'CSS variable delay.' },
                ],
            },
            {
                id: 'easing',
                title: 'Easing',
                cases: [
                    { classes: 'motion-preset-slide-up motion-ease', hint: 'Default easing.' },
                    { classes: 'motion-preset-slide-up motion-ease-linear', hint: 'Linear.' },
                    { classes: 'motion-preset-slide-up motion-ease-in', hint: 'Ease in.' },
                    { classes: 'motion-preset-slide-up motion-ease-out', hint: 'Ease out.' },
                    { classes: 'motion-preset-slide-up motion-ease-in-out', hint: 'Ease in out.' },
                    { classes: 'motion-preset-slide-up motion-ease-spring-smooth', hint: 'Smooth spring.' },
                    { classes: 'motion-preset-slide-up motion-ease-spring-snappy', hint: 'Snappy spring.' },
                    { classes: 'motion-preset-slide-up motion-ease-spring-bouncy', hint: 'Bouncy spring.' },
                    { classes: 'motion-preset-slide-up motion-ease-spring-bouncier', hint: 'Bouncier spring.' },
                    { classes: 'motion-preset-slide-up motion-ease-spring-bounciest', hint: 'Bounciest spring.' },
                    { classes: 'motion-preset-slide-up motion-ease-bounce', hint: 'Bounce curve.' },
                    { classes: 'motion-preset-slide-up motion-ease-in-back', hint: 'In back.' },
                    { classes: 'motion-preset-slide-up motion-ease-out-back', hint: 'Out back.' },
                    { classes: 'motion-preset-slide-up motion-ease-in-out-back', hint: 'In out back.' },
                    { classes: 'motion-preset-slide-up motion-ease-[var(--curve)]', hint: 'CSS variable easing.' },
                ],
            },
            {
                id: 'property-targets',
                title: 'Property Targeted Modifiers',
                cases: [
                    { classes: 'motion-scale-in-150 motion-blur-in-lg motion-duration-1200/scale', hint: 'Only scale duration changes.' },
                    { classes: 'motion-translate-y-in-100 motion-opacity-in-0 motion-delay-500/translate', hint: 'Only translate delays.' },
                    { classes: 'motion-rotate-in-180 motion-opacity-in-0 motion-delay-500/rotate', hint: 'Only rotate delays.' },
                    { classes: 'motion-blur-in-xl motion-scale-in-75 motion-duration-1000/blur', hint: 'Only filter duration changes.' },
                    { classes: 'motion-grayscale-in-100 motion-scale-in-75 motion-delay-300/grayscale', hint: 'Grayscale uses the filter channel.' },
                    { classes: 'motion-opacity-in-0 motion-translate-y-in-50 motion-delay-300/opacity', hint: 'Only opacity delays.' },
                    { classes: 'motion-bg-in-red-500 motion-rotate-in-90 motion-duration-700/background', hint: 'Only background duration changes.' },
                    { classes: 'motion-text-in-blue-500 motion-grayscale-in-75 motion-delay-400/text', hint: 'Only text color delays.' },
                    { classes: 'motion-scale-in-150 motion-opacity-in-0 motion-ease-spring-bouncy/scale', hint: 'Only scale gets bouncy.' },
                    { classes: 'motion-translate-x-in-100 motion-opacity-in-0 motion-ease-out-back/translate', hint: 'Only translate gets out-back.' },
                ],
            },
            {
                id: 'loops',
                title: 'Loop Counts',
                cases: [
                    { classes: 'motion-translate-y-loop-25 motion-loop', hint: 'Default infinite loop.' },
                    { classes: 'motion-translate-y-loop-25 motion-loop-infinite', hint: 'Explicit infinite loop.' },
                    { classes: 'motion-translate-y-loop-25 motion-loop-once', hint: 'One loop.' },
                    { classes: 'motion-translate-y-loop-25 motion-loop-twice', hint: 'Two loops.' },
                    { classes: 'motion-translate-y-loop-25 motion-loop-[3]', hint: 'Arbitrary count.' },
                    { classes: 'motion-scale-loop-125 motion-rotate-loop-180 motion-loop-twice/scale', hint: 'Only scale loops twice.' },
                    { classes: 'motion-scale-loop-125 motion-rotate-loop-180 motion-loop-[4]/rotate', hint: 'Only rotate loops four times.' },
                    { classes: 'motion-opacity-loop-25 motion-bg-loop-blue-500 motion-loop-once/opacity', hint: 'Only opacity loops once.' },
                    { classes: 'motion-bg-loop-blue-500 motion-text-loop-red-500 motion-loop-twice/background', hint: 'Only background loops twice.' },
                    { classes: 'motion-bg-loop-blue-500 motion-text-loop-red-500 motion-loop-[3]/text', hint: 'Only text loops three times.' },
                ],
            },
            {
                id: 'state-controls',
                title: 'Wait, Still, Pause, Play',
                cases: [
                    { classes: 'wait motion-preset-spin', hint: 'Wait pauses descendants until removed.' },
                    { classes: 'still motion-preset-spin', hint: 'Still zeros duration and delay.' },
                    { classes: 'pause motion-preset-spin', hint: 'Pause shorthand.' },
                    { classes: 'play motion-preset-spin', hint: 'Play shorthand.' },
                    { classes: 'motion-paused motion-preset-spin', hint: 'Pauses self and pseudo elements.' },
                    { classes: 'motion-running motion-preset-spin', hint: 'Running override.' },
                    { classes: 'hover:wait motion-preset-spin', hint: 'Hover pauses animation.' },
                    { classes: 'hover:still motion-preset-spin', hint: 'Hover jumps to still state.' },
                    { classes: 'hover:motion-paused motion-preset-spin', hint: 'Variant pause.' },
                    { classes: 'hover:motion-running motion-preset-spin motion-paused', hint: 'Hover resumes paused motion.' },
                ],
            },
            {
                id: 'repeat-group',
                title: 'Repeat And Group Markers',
                cases: [
                    { classes: 'motion-group', hint: 'Group marker for shared step timelines.', type: 'sequence' },
                    { classes: 'motion-repeat motion-repeat-delay-500 motion-repeat-count-twice motion-group', hint: 'Repeat marker with delay and count.', type: 'sequence' },
                    { classes: 'motion-repeat motion-repeat-delay-2s motion-repeat-count-[3] motion-group', hint: 'Raw seconds repeat delay and arbitrary count.', type: 'sequence' },
                    { classes: 'motion-repeat motion-repeat-delay-[1.2s] motion-repeat-count-infinite motion-group', hint: 'Bracket delay plus infinite count.', type: 'sequence' },
                ],
            },
            {
                id: 'step-modifiers',
                title: 'Step Timeline Modifiers',
                cases: [
                    { classes: 'motion-group', hint: 'Step 1 duration override.', type: 'step', children: ['step-1:motion-duration-1000 step-1:motion-preset-slide-up', 'step-2:motion-preset-pop'] },
                    { classes: 'motion-group', hint: 'Step 2 delay inside its slot.', type: 'step', children: ['step-1:motion-preset-slide-up', 'step-2:motion-delay-500 step-2:motion-preset-pop'] },
                    { classes: 'motion-group', hint: 'Step 2 gap after step 1.', type: 'step', children: ['step-1:motion-preset-slide-up', 'step-2:motion-gap-500 step-2:motion-preset-pop'] },
                    { classes: 'motion-group', hint: 'Step 2 overlap starts early.', type: 'step', children: ['step-1:motion-duration-1000 step-1:motion-preset-slide-up', 'step-2:motion-overlap-300 step-2:motion-preset-pop'] },
                    { classes: 'motion-group', hint: 'Step easing override.', type: 'step', children: ['step-1:motion-preset-slide-up', 'step-2:motion-ease-spring-bouncy step-2:motion-preset-expand'] },
                    { classes: 'motion-group', hint: 'Arbitrary step timing values.', type: 'step', children: ['step-1:motion-duration-[1.2s] step-1:motion-preset-slide-right', 'step-2:motion-gap-[0.8s] step-2:motion-preset-slide-up'] },
                ],
            },
        ];

        const app = document.getElementById('app');
        const jumpList = document.getElementById('jump-list');

        function escapeHTML(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('"', '&quot;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;');
        }

        function classKind(token) {
            const parts = token.split(':');
            const base = parts.at(-1);
            const prefixes = parts.slice(0, -1);

            if (/^step-\d+$/.test(prefixes.at(0) || '')) return 'step';
            if (token === 'motion-group') return 'group';
            if (/^(group|peer|dark)$/.test(token) || prefixes.length) return /^step-\d+$/.test(prefixes.at(0) || '') ? 'step' : 'variant';
            if (/^(wait|still|pause|play|motion-paused|motion-running)$/.test(base)) return 'state';
            if (/^motion-repeat/.test(base)) return 'loop';
            if (/^motion-preset-/.test(base)) return 'preset';
            if (/^motion-(duration|delay|ease|gap|overlap|loop)/.test(base)) return 'modifier';
            if (/^motion-(scale|translate|rotate|opacity|blur|grayscale|bg|text)-/.test(base)) return 'utility';
            if (/loop|pulse|spin|blink|float|oscillate|wobble|seesaw|stretch/.test(base)) return 'loop';
            return 'other';
        }

        function highlightClasses(classValue) {
            return classValue
                .split(/\s+/)
                .filter(Boolean)
                .map((token) => `<span class="code-class code-class--${classKind(token)}">${escapeHTML(token)}</span>`)
                .join(' ');
        }

        function highlightCode(source) {
            return escapeHTML(source).replace(/class=&quot;([^&]*)&quot;/g, (_, classes) => `class=&quot;${highlightClasses(classes)}&quot;`);
        }

        function labelFor(classes) {
            return classes.split(/\s+/)[0]
                .replace(/^.*:/, '')
                .replace(/^motion-preset-/, '')
                .replace(/^motion-/, '')
                .replaceAll('-', ' ');
        }

        function renderDemo(test) {
            if (test.type === 'sequence') {
                return `
                    <div data-motion-group class="${escapeHTML(test.classes)}">
                        <div class="step-1:motion-preset-slide-up">1</div>
                        <div class="step-2:motion-preset-pop">2</div>
                        <div class="step-3:motion-preset-slide-left">3</div>
                    </div>
                `;
            }

            if (test.type === 'step') {
                return `
                    <div data-motion-group class="${escapeHTML(test.classes)}">
                        ${test.children.map((classes, index) => `<div class="${escapeHTML(classes)}">${index + 1}</div>`).join('')}
                    </div>
                `;
            }

            return `<div data-motion-preview class="${escapeHTML(test.classes)}">${escapeHTML(labelFor(test.classes))}</div>`;
        }

        function renderCode(test) {
            if (test.type === 'sequence') {
                return `<div class="${test.classes}">
  <div class="step-1:motion-preset-slide-up">1</div>
  <div class="step-2:motion-preset-pop">2</div>
  <div class="step-3:motion-preset-slide-left">3</div>
</div>`;
            }

            if (test.type === 'step') {
                return `<div class="${test.classes}">
${test.children.map((classes, index) => `  <div class="${classes}">${index + 1}</div>`).join('\n')}
</div>`;
            }

            return `<div class="${test.classes}">${labelFor(test.classes)}</div>`;
        }

        function expectationsFor(test) {
            const classes = test.type === 'step'
                ? [test.classes].concat(test.children).join(' ')
                : test.classes;
            const bullets = [test.hint];

            if (/motion-duration/.test(classes)) bullets.push('The same motion should run, with only duration changed by the modifier.');
            if (/motion-delay/.test(classes)) bullets.push('The animation should wait before starting, then finish normally.');
            if (/motion-ease/.test(classes)) bullets.push('The motion path should stay the same while only the easing curve changes.');
            if (/\/(scale|translate|rotate|opacity|blur|grayscale|background|text)/.test(classes)) bullets.push('The slash target should affect only that animation channel.');
            if (/motion-loop/.test(classes)) bullets.push('The loop count should match the token or bracket value.');
            if (/wait\b/.test(classes)) bullets.push('Wait should pause motion until the wait class is removed.');
            if (/(still|pause|motion-paused)/.test(classes)) bullets.push('The animation should be held instead of visibly running.');
            if (/(play|motion-running)/.test(classes)) bullets.push('Running state should override a paused state when both apply.');
            if (/motion-group/.test(classes)) bullets.push('Children should share one step timeline inside the group.');
            if (/motion-repeat/.test(classes)) bullets.push('Repeat classes configure replay delay/count; the JS repeat helper must be initialized to remount the group.');
            if (test.type === 'step') bullets.push('Step modifiers should apply inside their numbered slot without breaking sibling timing.');

            return bullets.filter((bullet, index, list) => list.indexOf(bullet) === index);
        }

        function renderExpected(test) {
            return `<ul class="expected-list">${expectationsFor(test).map((bullet) => `<li>${escapeHTML(bullet)}</li>`).join('')}</ul>`;
        }

        function renderRow(test) {
            const stage = renderDemo(test).trim();
            const code = renderCode(test);
            return `
                <article class="row">
                    <div class="class-cell">
                        <div class="cell-label">Code</div>
                        <pre class="code-block"><code>${highlightCode(code)}</code></pre>
                    </div>
                    <div class="expected-cell">
                        <div class="cell-label">Expected</div>
                        ${renderExpected(test)}
                    </div>
                    <div class="preview-cell">
                        <div class="cell-label">Preview</div>
                        <div class="stage">${stage}</div>
                    </div>
                </article>
            `;
        }

        function renderSection(section) {
            return `
                <section class="section" id="${escapeHTML(section.id)}">
                    <div class="section-head">
                        <h2>${escapeHTML(section.title)}</h2>
                        <div class="count">${section.cases.length} checks</div>
                    </div>
                    <div class="rows">${section.cases.map(renderRow).join('')}</div>
                </section>
            `;
        }

        jumpList.innerHTML = sections.map((section) => `<a href="#${escapeHTML(section.id)}">${escapeHTML(section.title)} ${section.cases.length}</a>`).join('');
        app.innerHTML = sections.map(renderSection).join('');

        document.querySelector('[data-action="replay"]').addEventListener('click', () => {
            document.querySelectorAll('[data-motion-preview], [data-motion-group] > *').forEach((node) => {
                const clone = node.cloneNode(true);
                node.replaceWith(clone);
            });
        });
    </script>
</body>
</html>
